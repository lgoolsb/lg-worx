<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LG WORX</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">

<div class="logoBox">

<img
src="logo.svg"
alt="LG WORX Logo"
style="
width:100%;
height:100%;
border-radius:20px;
">

</div>

<div>

<h1>LG WORX</h1>

<p>Professional Machining Tools</p>

</div>

</div>

<div class="unitToggle">

<button id="inchButton" class="active">IN</button>

<button id="mmButton">MM</button>

</div>

</header>

<section class="search">

<input
type="text"
placeholder="Quick Calculate">

</section>

<section class="toolGrid">

<button class="toolButton" id="sineBlock">

<div style="font-size:42px;">📐</div>

<span>Sine Block</span>

</button>

<button class="toolButton">

<div style="font-size:42px;">📏</div>

<span>Triangle</span>

</button>

<button class="toolButton">

<div style="font-size:42px;">🔩</div>

<span>Bolt Circle</span>

</button>

<button class="toolButton">

<div style="font-size:42px;">⚙️</div>

<span>Fanuc</span>

</button>

<button class="toolButton">

<div style="font-size:42px;">🕳️</div>

<span>Drill & Tap</span>

</button>

<button class="toolButton">

<div style="font-size:42px;">📊</div>

<span>Converter</span>

</button>

</section>

<section id="mainPanel">

<h2>

Welcome to LG WORX

</h2>

<p>

Choose a machining tool above to begin.

</p>

</section>

<footer class="bottomNav">

<button class="navButton activeNav" id="homeNav">

🏠

<span>Home</span>

</button>

<button class="navButton" id="favoritesNav">

⭐

<span>Favorites</span>

</button>

<button class="navButton" id="settingsNav">

⚙️

<span>Settings</span>

</button>

</footer>

<script src="app.js"></script>

</body>

</html>
